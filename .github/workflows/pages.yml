name: Deploy AAPS Website

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "studio/**"
      - "src/aaps.js"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Prepare static site
        run: |
          cp src/aaps.js studio/aaps.js
          rm -rf website/studio
          mkdir -p website/studio
          cp -R studio/. website/studio/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: website
      - id: deployment
        uses: actions/deploy-pages@v4
